<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindfulScreen - Estadísticas + Excel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React Core -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Dependencies for Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
    
    <!-- Utilities -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        .scale-in-center {
            animation: scale-in-center 0.3s cubic-bezier(0.250, 0.460, 0.450, 0.940) both;
        }
        @keyframes scale-in-center {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts || {};
        
        // =========================================================
        // CONFIGURACIÓN: PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        // =========================================================
        const GOOGLE_SHEETS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6WSzPiKSaArbW1TwNgs3XA7Xnfe32JAhfmgCbfEFjLgqLfhpH6tqfdapbIdT75icfEg/exec"; 
        
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const CATEGORIES = [
            { id: 'social', name: 'Redes Sociales', icon: 'smartphone', color: '#ec4899', bg: 'bg-pink-500', fill: 'bg-pink-500' },
            { id: 'games', name: 'Videojuegos', icon: 'gamepad-2', color: '#a855f7', bg: 'bg-purple-500', fill: 'bg-purple-500' },
            { id: 'ai', name: 'IA (Chatbots)', icon: 'bot', color: '#3b82f6', bg: 'bg-blue-500', fill: 'bg-blue-500' },
            { id: 'web', name: 'Búsquedas web', icon: 'globe', color: '#22c55e', bg: 'bg-green-500', fill: 'bg-green-500' },
        ];

        const EMOTIONS = [
            { key: 'Feliz', emoji: '😄', color: '#4ade80' },
            { key: 'Neutral', emoji: '😐', color: '#94a3b8' },
            { key: 'Triste', emoji: '😢', color: '#60a5fa' },
            { key: 'Enojado', emoji: '😡', color: '#f87171' },
            { key: 'Entusiasmado', emoji: '🤩', color: '#fbbf24' },
        ];

        function App() {
            const [isSetup, setIsSetup] = useState(true);
            const [customLimits, setCustomLimits] = useState({ social: 60, games: 60, ai: 60, web: 60 });
            const [timers, setTimers] = useState({});
            const [activeCategory, setActiveCategory] = useState(null);
            const [surveyCategory, setSurveyCategory] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showStats, setShowStats] = useState(false);
            
            // Estado para las estadísticas locales (se guarda en memoria)
            const [localStats, setLocalStats] = useState({
                social: { Feliz: 0, Neutral: 0, Triste: 0, Enojado: 0, Entusiasmado: 0 },
                games: { Feliz: 0, Neutral: 0, Triste: 0, Enojado: 0, Entusiasmado: 0 },
                ai: { Feliz: 0, Neutral: 0, Triste: 0, Enojado: 0, Entusiasmado: 0 },
                web: { Feliz: 0, Neutral: 0, Triste: 0, Enojado: 0, Entusiasmado: 0 },
            });
            
            const lastUpdateRef = useRef(null);

            const handleEmotionSelect = async (emotionKey) => {
                if (isSubmitting) return;
                setIsSubmitting(true);
                const currentCategory = surveyCategory;

                // 1. Actualizar estadísticas locales inmediatamente
                setLocalStats(prev => ({
                    ...prev,
                    [currentCategory]: {
                        ...prev[currentCategory],
                        [emotionKey]: prev[currentCategory][emotionKey] + 1
                    }
                }));

                // 2. Enviar datos al Excel
                if (GOOGLE_SHEETS_SCRIPT_URL && !GOOGLE_SHEETS_SCRIPT_URL.includes("TU_URL")) {
                    try {
                        await fetch(GOOGLE_SHEETS_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                timestamp: new Date().toLocaleString(),
                                userId: "Usuario-Local",
                                category: currentCategory,
                                emotion: emotionKey
                            })
                        });
                    } catch (e) {
                        console.error("Error al enviar a Excel:", e);
                    }
                }
                
                setSurveyCategory(null);
                setIsSubmitting(false);
            };

            const startApp = () => {
                const initialTimers = {};
                CATEGORIES.forEach(cat => { initialTimers[cat.id] = customLimits[cat.id] * 60; });
                setTimers(initialTimers);
                setIsSetup(false);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            useEffect(() => {
                let interval;
                if (activeCategory && !isSetup) {
                    lastUpdateRef.current = Date.now();
                    interval = setInterval(() => {
                        const now = Date.now();
                        const delta = Math.floor((now - lastUpdateRef.current) / 1000);
                        if (delta >= 1) {
                            setTimers(prev => {
                                const newVal = prev[activeCategory] - delta;
                                if (newVal <= 0) {
                                    setSurveyCategory(activeCategory);
                                    setActiveCategory(null);
                                    return { ...prev, [activeCategory]: 0 };
                                }
                                return { ...prev, [activeCategory]: newVal };
                            });
                            lastUpdateRef.current = now;
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [activeCategory, isSetup]);

            const pieData = useMemo(() => {
                return CATEGORIES.map(cat => {
                    const total = customLimits[cat.id] * 60;
                    const used = total - (timers[cat.id] || 0);
                    return { name: cat.name, value: used, color: cat.color };
                }).filter(d => d.value > 0);
            }, [timers, customLimits]);

            const barChartData = CATEGORIES.map(cat => ({
                name: cat.name,
                ...localStats[cat.id]
            }));

            return (
                <div className="min-h-screen flex justify-center items-center p-0 sm:p-4">
                    <div className="w-full h-screen sm:h-[800px] max-w-sm bg-white flex flex-col sm:rounded-[3rem] relative sm:shadow-2xl overflow-hidden border-8 border-white">
                        
                        {isSetup ? (
                            <div className="flex-1 flex flex-col p-8">
                                <header className="pt-6 pb-8 text-center">
                                    <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight">Mindful<span className="text-blue-600">Excel</span></h1>
                                    <p className="text-gray-400 text-xs mt-2 uppercase tracking-widest font-bold">Configura tus límites</p>
                                </header>
                                <div className="flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-4">
                                    {CATEGORIES.map(cat => (
                                        <div key={cat.id} className="bg-gray-50 p-4 rounded-3xl border border-gray-100 flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 h-10 rounded-2xl ${cat.bg} flex items-center justify-center text-white shadow-sm`}>
                                                    <Icon name={cat.icon} size={18} />
                                                </div>
                                                <span className="font-bold text-sm text-gray-700">{cat.name}</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <button onClick={() => setCustomLimits(p => ({...p, [cat.id]: Math.max(5, p[cat.id]-5)}))} className="w-8 h-8 bg-white rounded-full border shadow-sm hover:bg-gray-50">-</button>
                                                <span className="font-bold w-10 text-center text-sm">{customLimits[cat.id]}m</span>
                                                <button onClick={() => setCustomLimits(p => ({...p, [cat.id]: Math.min(240, p[cat.id]+5)}))} className="w-8 h-8 bg-white rounded-full border shadow-sm hover:bg-gray-50">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={startApp} className="mt-6 w-full py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs">
                                    Empezar Sesión
                                </button>
                            </div>
                        ) : (
                            <>
                                <header className="pt-10 pb-4 px-8 flex justify-between items-center">
                                    <h1 className="text-2xl font-black text-gray-900 tracking-tighter">Mindful<span className="text-blue-600">Screen</span></h1>
                                    <button onClick={() => setIsSetup(true)} className="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 hover:text-gray-600"><Icon name="settings" size={18}/></button>
                                </header>

                                <div className="flex-1 px-8 py-2 flex flex-col gap-6 overflow-y-auto hide-scrollbar">
                                    <div className="flex flex-col gap-6">
                                        {CATEGORIES.map(cat => {
                                            const isActive = activeCategory === cat.id;
                                            const timeRem = timers[cat.id];
                                            const total = customLimits[cat.id] * 60;
                                            const elapsed = total - timeRem;
                                            const percent = (elapsed / total) * 100;
                                            return (
                                                <div key={cat.id} className={`flex items-center gap-4 transition-all ${activeCategory && !isActive ? 'opacity-30' : ''}`}>
                                                    <button 
                                                        onClick={() => timeRem === 0 ? setTimers(p => ({...p, [cat.id]: total})) : (activeCategory === cat.id ? (setActiveCategory(null), setSurveyCategory(cat.id)) : setActiveCategory(cat.id))}
                                                        className={`w-14 h-14 rounded-[1.25rem] flex items-center justify-center text-white shadow-lg transition-all ${timeRem === 0 ? 'bg-red-500' : isActive ? 'bg-black' : cat.bg}`}
                                                    >
                                                        <Icon name={timeRem === 0 ? 'rotate-ccw' : isActive ? 'pause' : 'play'} />
                                                    </button>
                                                    <div className="flex-1">
                                                        <div className="flex justify-between font-extrabold text-[11px] mb-1.5 text-gray-800 uppercase tracking-tight">
                                                            <span>{cat.name}</span>
                                                            <span className={timeRem === 0 ? 'text-red-500 font-black' : 'text-gray-400'}>{formatTime(timeRem)}</span>
                                                        </div>
                                                        <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden border border-gray-50">
                                                            <div className={`h-full transition-all duration-1000 ${timeRem === 0 ? 'bg-red-500' : cat.fill}`} style={{ width: `${percent}%` }}></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    <div className="mt-4 bg-gray-50 rounded-[2.5rem] p-6 border border-gray-100 flex-1 flex flex-col">
                                        <p className="text-center text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Uso hoy</p>
                                        <div className="flex-1 min-h-[180px] relative">
                                            {pieData.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie data={pieData} cx="50%" cy="50%" innerRadius={45} outerRadius={65} paddingAngle={5} dataKey="value" stroke="none">
                                                            {pieData.map((e, i) => <Cell key={i} fill={e.color} />)}
                                                        </Pie>
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : (
                                                <div className="absolute inset-0 flex items-center justify-center text-[10px] text-gray-300 font-bold uppercase text-center px-10 leading-relaxed">
                                                    Activa un cronómetro para ver el gráfico
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="p-8 flex flex-col gap-3">
                                    <button onClick={() => setShowStats(true)} className="w-full py-4 bg-gray-900 text-white rounded-[2rem] font-black text-xs flex items-center justify-center gap-3 hover:bg-black transition-all uppercase tracking-widest shadow-xl">
                                        <Icon name="bar-chart-2" size={18} /> Mis Estadísticas
                                    </button>
                                    <p className="text-center text-[9px] text-gray-300 font-bold uppercase tracking-widest">Sincronizado con Google Sheets</p>
                                </div>
                            </>
                        )}

                        {surveyCategory && (
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-8">
                                <div className="bg-white rounded-[3rem] p-10 w-full text-center scale-in-center shadow-2xl">
                                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6"><Icon name="smile" size={32} /></div>
                                    <h2 className="text-2xl font-black text-gray-800 mb-2">Pausa Mental</h2>
                                    <p className="text-sm text-gray-400 mb-8 font-medium">¿Cómo te has sentido usando <br/><span className="text-gray-900 font-bold">{CATEGORIES.find(c => c.id === surveyCategory)?.name}</span>?</p>
                                    <div className="grid grid-cols-5 gap-3">
                                        {EMOTIONS.map(emo => (
                                            <button key={emo.key} onClick={() => handleEmotionSelect(emo.key)} className="flex flex-col items-center gap-2 group">
                                                <span className="text-4xl group-hover:scale-125 transition-transform duration-200 drop-shadow-sm">{emo.emoji}</span>
                                                <span className="text-[8px] font-black text-gray-300 group-hover:text-blue-500 uppercase tracking-tighter">{emo.key}</span>
                                            </button>
                                        ))}
                                    </div>
                                    {isSubmitting && <div className="mt-8 text-[9px] text-blue-500 font-black uppercase tracking-[0.2em] loading-pulse">Enviando a Excel...</div>}
                                </div>
                            </div>
                        )}

                        {showStats && (
                            <div className="absolute inset-0 bg-white z-40 p-8 flex flex-col animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-start mb-8">
                                    <div>
                                        <h2 className="text-2xl font-black text-gray-900 tracking-tighter">Tu Historial</h2>
                                        <p className="text-[10px] text-gray-400 font-black uppercase tracking-widest">Emociones registradas hoy</p>
                                    </div>
                                    <button onClick={() => setShowStats(false)} className="p-3 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors"><Icon name="x" size={20}/></button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto hide-scrollbar">
                                    <div className="h-64 w-full mb-8">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={barChartData} margin={{ bottom: 40 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="name" fontSize={9} axisLine={false} tickLine={false} angle={-35} textAnchor="end" interval={0} />
                                                <YAxis fontSize={9} axisLine={false} tickLine={false} allowDecimals={false} />
                                                <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} />
                                                {EMOTIONS.map(emo => <Bar key={emo.key} dataKey={emo.key} stackId="a" fill={emo.color} radius={[0, 0, 0, 0]} />)}
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>

                                    <div className="space-y-3">
                                        {CATEGORIES.map(cat => (
                                            <div key={cat.id} className="p-4 bg-gray-50 rounded-3xl border border-gray-100">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <div className={`w-2 h-2 rounded-full ${cat.bg}`}></div>
                                                    <span className="text-[10px] font-black text-gray-600 uppercase tracking-widest">{cat.name}</span>
                                                </div>
                                                <div className="flex justify-between px-2">
                                                    {EMOTIONS.map(emo => (
                                                        <div key={emo.key} className="flex flex-col items-center">
                                                            <div className="text-xl mb-1">{emo.emoji}</div>
                                                            <div className="text-[10px] font-bold text-gray-800">
                                                                {localStats[cat.id]?.[emo.key] || 0}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="mt-6 pt-4 border-t border-gray-100 text-center">
                                    <p className="text-[8px] text-gray-300 font-bold uppercase">Nota: Estos datos se reinician al recargar la página</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
